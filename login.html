<!DOCTYPE html>
<html lang="en">
<head>
    <script src="theme_engine.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK TRACKS | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #6366f1; 
            --bg: #0f172a; 
            --card: rgba(30, 41, 59, 0.7);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .login-card { 
            background: var(--card); 
            backdrop-filter: blur(25px); 
            padding: 45px; 
            border-radius: 38px; 
            border: 1px solid rgba(255,255,255,0.08); 
            width: 90%; 
            max-width: 420px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); 
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo { font-size: 32px; font-weight: 800; margin-bottom: 35px; letter-spacing: -1.5px; }
        .logo span { color: var(--primary); }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #94a3b8; font-weight: 700; margin-bottom: 8px; padding-left: 5px; }
        
        input { 
            width: 100%; padding: 16px; border-radius: 14px; 
            border: 1px solid rgba(255,255,255,0.05); background: rgba(15, 23, 42, 0.8); 
            color: white; font-size: 16px; transition: 0.3s;
            outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }

        button { 
            width: 100%; padding: 18px; border-radius: 14px; border: none; 
            background: linear-gradient(135deg, var(--primary), #a855f7); 
            color: white; font-weight: 700; cursor: pointer; font-size: 16px; 
            transition: 0.4s; margin-top: 10px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #error { color: #f87171; font-size: 13px; margin-top: 20px; font-weight: 500; display: none; }
        
        .footer { margin-top: 30px; font-size: 11px; color: #64748b; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">SK <span>TRACKS</span></div>
        <p style="color: #94a3b8; margin-bottom: 35px; font-size: 14px; line-height: 1.6;">Welcome back! Please sign in to access your dashboard.</p>
        
        <div class="input-group">
            <label>Master Email</label>
            <input type="email" id="email" placeholder="admin@sktracks.com">
        </div>

        <div class="input-group">
            <label>Security Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="loginBtn" onclick="handleLogin()"><i class="fa-solid fa-shield-halved"></i> Authorize Access</button>

        <div style="margin: 25px 0; display: flex; align-items: center; gap: 15px;">
            <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.05);"></div>
            <span style="font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase;">or continue with</span>
            <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.05);"></div>
        </div>

        <button onclick="handleGoogleLogin()" style="background: white; color: #1e293b; margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google Workspace
        </button>
        
        <div style="margin-top: 20px;">
            <a href="#" onclick="handleReset()" style="color: #94a3b8; font-size: 12px; text-decoration: none; transition: 0.3s; font-weight: 600;">Forgot Security Password?</a>
        </div>

        <div id="error"></div>
        <div id="success" style="color: #4ade80; font-size: 13px; margin-top: 20px; font-weight: 500; display: none;"></div>
        <div class="footer">ENCRYPTED ENTERPRISE LOGIN</div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="firebase_config.js"></script>

    <script>
        // Handle unauthorized error from URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'unauthorized') {
            const err = document.getElementById('error');
            err.innerText = "Access Denied: Only sathissk12@gmail.com is authorized.";
            err.style.display = 'block';
        }

        // Redirect if already logged in
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                if (user.email === "sathissk12@gmail.com") {
                    window.location.href = "index.html";
                } else {
                    firebase.auth().signOut().then(() => {
                        const err = document.getElementById('error');
                        err.innerText = "Access Denied: This account is not authorized.";
                        err.style.display = 'block';
                    });
                }
            }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('error');
            const succ = document.getElementById('success');

            if(!e || !p) {
                err.innerText = "Please fill in all fields.";
                err.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            err.style.display = 'none';
            succ.style.display = 'none';

            try {
                await firebase.auth().signInWithEmailAndPassword(e, p);
            } catch (error) {
                let msg = error.message;
                if(error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') msg = "Access Denied: Invalid Credentials";
                err.innerText = msg;
                err.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Authorize Access';
            }
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await firebase.auth().signInWithPopup(provider);
            } catch (error) {
                document.getElementById('error').innerText = "Google Sign-In Failed: Make sure Google Auth is enabled.";
                document.getElementById('error').style.display = 'block';
            }
        }

        async function handleReset() {
            const e = document.getElementById('email').value;
            const err = document.getElementById('error');
            const succ = document.getElementById('success');

            if(!e) {
                err.innerText = "Please enter your email first to reset password.";
                err.style.display = 'block';
                return;
            }

            try {
                await firebase.auth().sendPasswordResetEmail(e);
                err.style.display = 'none';
                succ.innerText = "✨ Password reset link sent to your email!";
                succ.style.display = 'block';
            } catch (error) {
                err.innerText = error.message;
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
